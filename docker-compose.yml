version: '3.8'
services:
      # Banco de dados relacional
      postgres:
        image: postgres:15-alpine
        container_name: authguard_pg
        environment:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: ${DB_PASSWORD}
          POSTGRES_DB: authguard_db
        ports:
          - "5432:5432"
        volumes:
          - pgdata:/var/lib/postgresql/data
        restart: unless-stopped # Se o Docker reiniciar, o banco volta sozinho
  
      # Banco de dados em memória (cache/sessões)
      redis:
        image: redis:7-alpine
        container_name: authguard_redis
        ports:
          - "6379:6379"
        restart: unless-stopped
  
# Declaração dos volumes para os dados não sumirem quando o container parar
volumes:
    pgdata: